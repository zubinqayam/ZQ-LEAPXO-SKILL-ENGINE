# docker-compose.yml — LeapXO v9 local development stack
#
# Usage:
#   docker compose up
#
# Secrets are loaded from .env.local (never committed).
# Copy .env.example to .env.local and fill in values before starting.

services:

  # ── Backend (FastAPI) ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      PORT: "${PORT:-8000}"
      LEAPXO_ENV: "${LEAPXO_ENV:-development}"
      LEAPXO_DB_PATH: "/data/leapxo_v9.db"
      LEAPXO_REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0"
    env_file:
      - path: .env.local
        required: false
    volumes:
      - backend-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Frontend (Nginx serving Vite build) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    environment:
      BACKEND_PORT: "${PORT:-8000}"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (IPC, TTL-based) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --appendonly yes
      --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  backend-data:
  redis-data:
