# k8s/secrets.yaml — LeapXO v9 Kubernetes Secrets template
#
# IMPORTANT: This file is a TEMPLATE. Values must be base64-encoded and
# populated by your secrets management pipeline (Vault, SOPS, External Secrets
# Operator, etc.) BEFORE applying to the cluster.
#
# NEVER commit actual secret values to source control.
#
# Usage with External Secrets Operator (recommended):
#   Replace this file with an ExternalSecret referencing your vault backend.
#
# Usage for manual/dev setup:
#   kubectl create secret generic leapxo-vault-secrets \
#     --from-literal=db-key='<your-db-encryption-key>' \
#     --from-literal=api-key='<your-llm-api-key>' \
#     --from-literal=secret-key='<your-jwt-secret-key>' \
#     --from-literal=feedback-enc-key='<your-feedback-key>' \
#     --namespace leapxo

apiVersion: v1
kind: Secret
metadata:
  name: leapxo-vault-secrets
  namespace: leapxo
  labels:
    app.kubernetes.io/name: leapxo-skill-engine
    app.kubernetes.io/version: "9.0.0"
  annotations:
    # Rotate these values on a schedule — recommend 90-day rotation
    leapxo.ai/rotation-policy: "90d"
type: Opaque
data:
  # All values must be base64-encoded
  # echo -n 'your-value' | base64
  db-key:           ""   # SQLCipher database encryption key
  api-key:          ""   # LLM provider API key
  secret-key:       ""   # HMAC/JWT signing key
  feedback-enc-key: ""   # Feedback chatbot keyhole encryption key

---
# Redis auth secret
apiVersion: v1
kind: Secret
metadata:
  name: leapxo-redis-secret
  namespace: leapxo
  labels:
    app.kubernetes.io/name: leapxo-skill-engine
type: Opaque
data:
  redis-password: ""   # base64-encoded Redis password
  redis-url:      ""   # base64-encoded redis://:password@host:6379/0
