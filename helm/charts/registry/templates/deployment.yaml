apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-registry
  labels:
    app: registry
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-registry
spec:
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
