apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vector-db
  labels:
    app: vector-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vector-db
  template:
    metadata:
      labels:
        app: vector-db
    spec:
      containers:
        - name: vector-db
          image: "{{ .Values.vectorDB.image.repository }}:{{ .Values.vectorDB.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 6333
          volumeMounts:
            - name: vector-data
              mountPath: /data
      volumes:
        - name: vector-data
          {{- if .Values.vectorDB.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-vector-db-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vector-db
spec:
  selector:
    app: vector-db
  ports:
    - port: 6333
      targetPort: 6333
{{- if .Values.vectorDB.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-vector-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.vectorDB.persistence.size }}
{{- end }}
