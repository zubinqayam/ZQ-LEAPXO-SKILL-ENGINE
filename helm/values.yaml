# LEAPXO Skill Engine – Helm umbrella chart values
# Override per environment (staging, production) with -f values.prod.yaml

replicaCount: 3

image:
  pullPolicy: IfNotPresent

orchestrator:
  image:
    repository: leapxo/orchestrator
    tag: v2.1
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  service:
    port: 4000

registry:
  image:
    repository: leapxo/registry
    tag: v2.1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

frontend:
  image:
    repository: leapxo/frontend
    tag: v2.1
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    port: 80

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"
  persistence:
    enabled: true
    size: 1Gi

vectorDB:
  enabled: true
  type: hnsw
  image:
    repository: leapxo/vector-db
    tag: v2.1
  dimensions: 768
  persistence:
    enabled: true
    size: 10Gi

# PostgreSQL values are intentionally omitted until this chart declares
# and wires a PostgreSQL dependency or templates that consume them.

security:
  ecdsa: true
  tlsEnabled: true
  # Placeholder only: `security.networkPolicy` is not currently referenced by any
