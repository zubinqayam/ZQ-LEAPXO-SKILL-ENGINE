# .github/workflows/ci.yml — LeapXO v9 Continuous Integration
#
# Triggers: push to any branch, pull requests targeting main.
# Jobs:
#   lint     — ruff + mypy
#   test     — pytest with coverage
#   frontend — npm ci + build

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python lint ───────────────────────────────────────────────────
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy types-redis

      - name: ruff check
        run: ruff check src/ backend/ tests/

      - name: mypy
        run: mypy src/ backend/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # type stubs may be incomplete; advisory only

  # ── Python tests ──────────────────────────────────────────────────
  test:
    name: Python Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install fastapi uvicorn httpx pytest-asyncio

      - name: Run pytest
        run: pytest tests/ -v --tb=short --cov=src --cov=backend --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── Frontend build ────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
