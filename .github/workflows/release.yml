# .github/workflows/release.yml — LeapXO v9 Release Pipeline
#
# Triggers: push of a version tag (v9.x.x)
# Jobs:
#   test          — full pytest suite
#   docker-push   — build & push backend Docker image to GHCR
#   helm-package  — package and attach Helm chart to GitHub Release

name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write
  packages: write

jobs:
  # ── Full test suite ───────────────────────────────────────────────
  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install fastapi uvicorn httpx

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ── Docker backend image ──────────────────────────────────────────
  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/leapxo-skill-engine:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/leapxo-skill-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Helm chart package ────────────────────────────────────────────
  helm-package:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: helm package helm/leapxo-skill-engine --destination /tmp/helm-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/helm-artifacts/*.tgz
          generate_release_notes: true
